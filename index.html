<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar To-Do</title>
    <style>
        :root {
            --primary-color: #007aff;
            --bg-color: #f5f5f7;
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--bg-color);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; align-items: center;
        }

        header {
            width: 100%; height: 60px; background: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; border-bottom: 1px solid #ddd;
            position: sticky; top: 0; z-index: 10;
        }

        /* 달력 스타일 */
        .calendar-container {
            width: 90%; max-width: 400px; background: white;
            margin-top: 20px; border-radius: 15px; padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .calendar-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; font-weight: bold;
        }

        .calendar-grid {
            display: grid; grid-template-columns: repeat(7, 1fr);
            text-align: center; gap: 5px;
        }

        .day-label { font-size: 12px; color: #888; padding-bottom: 5px; }

        .day {
            padding: 10px 0; cursor: pointer; border-radius: 8px;
            font-size: 14px; transition: 0.2s;
        }

        .day:hover { background-color: #eee; }
        .day.selected { background-color: var(--primary-color) !important; color: white; }
        .day.today { background-color: #e1f0ff; font-weight: bold; color: var(--primary-color); }

        /* 할 일 목록 스타일 */
        .todo-container {
            width: 90%; max-width: 400px; margin: 20px 0;
        }

        .current-date-title { margin-bottom: 15px; font-size: 1.1rem; font-weight: bold; color: #333; }

        .input-group { display: flex; gap: 8px; margin-bottom: 15px; }

        input[type="text"] {
            flex: 1; padding: 12px; border: 1px solid #ddd;
            border-radius: 10px; outline: none; font-size: 16px;
        }

        #add-btn {
            padding: 0 15px; background: var(--primary-color); color: white;
            border: none; border-radius: 10px; font-weight: bold;
        }

        ul { list-style: none; padding: 0; margin-bottom: 80px; }

        li {
            background: white; margin-bottom: 8px; padding: 12px 15px;
            border-radius: 12px; display: flex; justify-content: space-between;
            align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        .delete-btn {
            background: #ff3b30; color: white; border: none;
            padding: 6px 10px; border-radius: 6px; font-size: 12px;
        }

        footer {
            position: fixed; bottom: 0; width: 100%; height: 50px;
            background: white; border-top: 1px solid #ddd;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #999;
        }
    </style>
</head>
<body>

<header>📅 캘린더 할 일</header>

<div class="calendar-container">
    <div class="calendar-header">
        <button onclick="changeMonth(-1)">◀</button>
        <span id="month-display"></span>
        <button onclick="changeMonth(1)">▶</button>
    </div>
    <div class="calendar-grid" id="calendar-grid">
        <div class="day-label">일</div><div class="day-label">월</div><div class="day-label">화</div>
        <div class="day-label">수</div><div class="day-label">목</div><div class="day-label">금</div><div class="day-label">토</div>
    </div>
</div>

<div class="todo-container">
    <div class="current-date-title" id="selected-date-text">날짜를 선택하세요</div>
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="할 일 입력...">
        <button id="add-btn">추가</button>
    </div>
    <ul id="todo-list"></ul>
</div>

<footer>© 2026 Personal Planner</footer>

<script>
    let currentViewDate = new Date();
    let selectedDateStr = ""; // YYYY-MM-DD 형식

    const monthDisplay = document.getElementById('month-display');
    const calendarGrid = document.getElementById('calendar-grid');
    const selectedDateText = document.getElementById('selected-date-text');
    const todoList = document.getElementById('todo-list');
    const input = document.getElementById('todo-input');

    function init() {
        const today = new Date();
        renderCalendar();
        selectDate(today.getFullYear(), today.getMonth(), today.getDate());
    }

    function renderCalendar() {
        // 기존 날짜 제거 (요일 라벨 제외)
        const labels = document.querySelectorAll('.day-label');
        calendarGrid.innerHTML = '';
        labels.forEach(l => calendarGrid.appendChild(l));

        const year = currentViewDate.getFullYear();
        const month = currentViewDate.getMonth();
        monthDisplay.innerText = `${year}년 ${month + 1}월`;

        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();

        // 빈칸 채우기
        for (let i = 0; i < firstDay; i++) {
            const empty = document.createElement('div');
            calendarGrid.appendChild(empty);
        }

        // 날짜 채우기
        const today = new Date();
        for (let d = 1; d <= lastDate; d++) {
            const dayEl = document.createElement('div');
            dayEl.className = 'day';
            dayEl.innerText = d;
            
            if (year === today.getFullYear() && month === today.getMonth() && d === today.getDate()) {
                dayEl.classList.add('today');
            }

            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
            if (dateStr === selectedDateStr) dayEl.classList.add('selected');

            dayEl.onclick = () => selectDate(year, month, d);
            calendarGrid.appendChild(dayEl);
        }
    }

    function selectDate(y, m, d) {
        selectedDateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        selectedDateText.innerText = `${y}년 ${m + 1}월 ${d}일의 할 일`;
        
        renderCalendar(); // 선택 표시 업데이트
        loadTodos();
    }

    function changeMonth(diff) {
        currentViewDate.setMonth(currentViewDate.getMonth() + diff);
        renderCalendar();
    }

    // 할 일 로직
    document.getElementById('add-btn').onclick = () => {
        if (!input.value.trim()) return;
        const todos = getTodos();
        todos.push(input.value);
        localStorage.setItem(selectedDateStr, JSON.stringify(todos));
        input.value = '';
        loadTodos();
    };

    function getTodos() {
        const data = localStorage.getItem(selectedDateStr);
        return data ? JSON.parse(data) : [];
    }

    function loadTodos() {
        todoList.innerHTML = '';
        const todos = getTodos();
        todos.forEach((text, index) => {
            const li = document.createElement('li');
            li.innerHTML = `<span>${text}</span><button class="delete-btn" onclick="deleteTodo(${index})">삭제</button>`;
            todoList.appendChild(li);
        });
    }

    function deleteTodo(index) {
        const todos = getTodos();
        todos.splice(index, 1);
        localStorage.setItem(selectedDateStr, JSON.stringify(todos));
        loadTodos();
    }

    init();
</script>

</body>
</html>
