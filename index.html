<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple To-Do</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f7;
            margin: 0;
            padding-top: 60px; /* 헤더 높이만큼 여백 */
            padding-bottom: 50px; /* 푸터 높이만큼 여백 */
            display: flex;
            justify-content: center;
        }

        /* --- 헤더 스타일 --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            height: 60px;
            background-color: #ffffff;
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            z-index: 1000;
        }

        /* --- 푸터 스타일 --- */
        footer {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 50px;
            background-color: #ffffff;
            border-top: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #888;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 25px;
            margin: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            outline: none;
            font-size: 16px;
        }

        button#add-btn {
            padding: 12px 20px;
            background-color: #007aff;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        ul { list-style: none; padding: 0; }

        li {
            background: #fafafa;
            margin-bottom: 10px;
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }

        .delete-btn {
            background-color: #ff3b30;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    📅 나의 할 일 목록
</header>

<div class="container">
    <div class="input-group">
        <input type="text" id="todo-input" placeholder="새로운 할 일...">
        <button id="add-btn">추가</button>
    </div>

    <ul id="todo-list"></ul>
</div>

<footer>
    © 2024 Simple Todo App
</footer>

<script>
    const input = document.getElementById('todo-input');
    const addBtn = document.getElementById('add-btn');
    const todoList = document.getElementById('todo-list');

    document.addEventListener('DOMContentLoaded', loadTodos);
    addBtn.addEventListener('click', addTodo);
    input.addEventListener('keypress', (e) => { if (e.key === 'Enter') addTodo(); });

    function addTodo() {
        if (input.value.trim() === '') return;
        const todoText = input.value;
        createTodoElement(todoText);
        saveTodo(todoText);
        input.value = '';
    }

    function createTodoElement(text) {
        const li = document.createElement('li');
        li.innerHTML = `<span>${text}</span><button class="delete-btn">삭제</button>`;
        li.querySelector('.delete-btn').addEventListener('click', () => {
            li.remove();
            removeTodo(text);
        });
        todoList.appendChild(li);
    }

    function saveTodo(todo) {
        let todos = localStorage.getItem('todos') ? JSON.parse(localStorage.getItem('todos')) : [];
        todos.push(todo);
        localStorage.setItem('todos', JSON.stringify(todos));
    }

    function loadTodos() {
        let todos = localStorage.getItem('todos') ? JSON.parse(localStorage.getItem('todos')) : [];
        todos.forEach(todo => createTodoElement(todo));
    }

    function removeTodo(todo) {
        let todos = JSON.parse(localStorage.getItem('todos'));
        const filteredTodos = todos.filter(t => t !== todo);
        localStorage.setItem('todos', JSON.stringify(filteredTodos));
    }
</script>

</body>
</html>
